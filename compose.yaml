services:
  app:
    build: .
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    command: pnpm dev --host

  test:
    build: .
    volumes:
      - .:/app
      - /app/node_modules
    command: pnpm test
    profiles:
      - test

  test-watch:
    build: .
    volumes:
      - .:/app
      - /app/node_modules
    command: pnpm test:watch
    profiles:
      - test

  e2e:
    image: mcr.microsoft.com/playwright:v1.52.0-noble
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - CI=true
      - DOCKER=true
    command: sh -c "corepack enable && pnpm install --frozen-lockfile && pnpm exec playwright test --reporter=list"
    depends_on:
      - app
    profiles:
      - e2e
